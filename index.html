<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERP Payment Module</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="icon">💳</span>
                <h1>Payment<span>Module</span></h1>
            </div>
        </header>

        <main>
            <div class="form-card">
                <div class="form-header">
                    <h2>Payment Entry</h2>
                    <p>Enter details to process the transaction</p>
                </div>

                <form id="erpForm">
                    <!-- Step 1: Payment Type -->
                    <div class="form-group" id="step-payment-type">
                        <label for="paymentType">Payment Type</label>
                        <select id="paymentType" name="paymentType" required>
                            <option value="" disabled selected>Select Payment Type</option>
                            <option value="DEAL">DEAL PAYMENT</option>
                            <option value="SALES">SALES PAYMENT</option>
                            <option value="EXPENSE">EXPENSE PAYMENT</option>
                        </select>
                    </div>

                    <div class="form-group hidden" id="step-party">
                        <label for="partyName">Which party is giving payment?</label>
                        <select id="partyName" name="partyName">
                            <option value="" disabled selected>Select Party</option>
                        </select>
                    </div>

                    <!-- Step 3: Document Number -->
                    <div class="form-group hidden" id="step-doc-number">
                        <label for="docNumber">Document Number</label>
                        <input type="text" id="docNumber" name="docNumber" placeholder="Enter doc number...">
                    </div>

                    <!-- Conditional Fields: DEAL PAYMENT -->
                    <div id="dealFields" class="conditional-section hidden">
                        <div class="section-title">Deal Information</div>

                        <div class="grid-2">
                            <div class="form-group">
                                <label>Party Name (Auto-fetch)</label>
                                <input type="text" id="dealPartyName" readonly>
                            </div>
                            <div class="form-group">
                                <label>Purchasing Company</label>
                                <select id="purchasingCompany">
                                    <option value="ABC Corp">ABC Corp</option>
                                    <option value="XYZ Ltd">XYZ Ltd</option>
                                    <option value="Global Tech">Global Tech</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid-2">
                            <div class="form-group">
                                <label>Bill Number (Auto-fetch)</label>
                                <input type="text" id="dealBillNumber" readonly>
                            </div>
                            <div class="form-group">
                                <label>Bill Date (Auto-fetch)</label>
                                <input type="text" id="dealBillDate" readonly>
                            </div>
                        </div>

                        <div class="grid-3">
                            <div class="form-group">
                                <label>Currency Code (Auto-fetch)</label>
                                <input type="text" id="currencyCode" readonly>
                            </div>
                            <div class="form-group">
                                <label>Currency Amount (Auto-fetch)</label>
                                <input type="number" id="currencyAmount" readonly>
                            </div>
                            <div class="form-group">
                                <label>Exchange Rate (Manual)</label>
                                <input type="number" id="dealExchangeRate" step="0.0001" placeholder="1.0000">
                            </div>
                        </div>

                        <div class="grid-2">
                            <div class="form-group">
                                <label>Receiving Currency Code</label>
                                <select id="receivingCurrencyCode">
                                    <option value="INR">INR</option>
                                    <option value="USD">USD</option>
                                    <option value="CAD">CAD</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Receiving Currency Amount</label>
                                <input type="text" id="receivingCurrencyAmount" readonly placeholder="Calculated...">
                            </div>
                        </div>

                        <div class="grid-2">
                            <div class="form-group">
                                <label>LCY Sender (Auto-fetch)</label>
                                <input type="text" id="lcySender" readonly>
                            </div>
                            <div class="form-group">
                                <label>LCY Receiver (Auto-fetch)</label>
                                <input type="text" id="lcyReceiver" readonly>
                            </div>
                        </div>
                    </div>

                    <!-- Conditional Fields: SALES PAYMENT -->
                    <div id="salesFields" class="conditional-section hidden">
                        <div class="section-title">Sales Information</div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Party Name (Auto-fetch)</label>
                                <input type="text" id="salesParty" readonly>
                            </div>
                            <div class="form-group">
                                <label>Commodity Name (Auto-fetch)</label>
                                <input type="text" id="salesCommodity" readonly>
                            </div>

                        </div>
                        <div class="grid-3">
                            <div class="form-group">
                                <label>Quantity (Auto-fetch)</label>
                                <input type="text" id="salesQty" readonly>
                            </div>
                            <div class="form-group">
                                <label>Rate (Auto-fetch)</label>
                                <input type="text" id="salesRate" readonly>
                            </div>
                            <div class="form-group">
                                <label>Total Value (Auto-fetch)</label>
                                <input type="text" id="salesTotal" readonly>
                            </div>
                        </div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Currency (Auto-fetch)</label>
                                <input type="text" id="salesCurrency" readonly>
                            </div>
                            <div class="form-group">
                                <label>Payment Term (Auto-fetch)</label>
                                <input type="text" id="salesTerm" readonly>
                            </div>
                        </div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Value of Advance (Auto-fetch)</label>
                                <input type="text" id="salesAdvance" readonly>
                            </div>
                            <div class="form-group">
                                <label>Percentage (%) (Auto-fetch)</label>
                                <input type="text" id="salesPercent" readonly>
                            </div>
                        </div>
                    </div>

                    <!-- Conditional Fields: EXPENSE PAYMENT -->
                    <div id="expenseFields" class="conditional-section hidden">
                        <div class="section-title">Expense Information</div>
                        <div class="form-group">
                            <label>Name of Party (Auto-fetch)</label>
                            <input type="text" id="expenseParty" readonly>
                        </div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Item Name (Auto-fetch)</label>
                                <input type="text" id="expenseItem" readonly>
                            </div>
                            <div class="form-group">
                                <label>Item Value (Auto-fetch)</label>
                                <input type="text" id="expenseValue" readonly>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Currency (Auto-fetch)</label>
                            <input type="text" id="expenseCurrency" readonly>
                        </div>
                    </div>

                    <div id="submitContainer" class="form-actions hidden">
                        <button type="submit" class="btn-primary">
                            <span>Process Payment</span>
                            <div class="btn-shine"></div>
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <!-- Feedback Toast -->
    <div id="toast" class="toast hidden"></div>

    <script src="script.js"></script>
</body>

</html>
