<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERP Payment Entry | Pro Portal</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="icon">💳</span>
                <h1>Payment<span>Module</span></h1>
            </div>
        </header>

        <main>
            <div class="form-card">
                <div class="form-header">
                    <h2>Payment Entry</h2>
                    <p>Enter details to process the transaction</p>
                </div>

                <form id="erpForm">
                    <!-- Step 1: Payment Type -->
                    <div class="form-group" id="step-payment-type">
                        <label for="paymentType">Payment Type</label>
                        <select id="paymentType" name="paymentType" required>
                            <option value="" disabled selected>Select Payment Type</option>
                            <option value="DEAL">DEAL PAYMENT</option>
                            <option value="SALES">SALES PAYMENT</option>
                            <option value="EXPENSE">EXPENSE PAYMENT</option>
                        </select>
                    </div>

                    <div class="form-group hidden" id="step-party">
                        <label for="partyName">Which party is giving payment?</label>
                        <select id="partyName" name="partyName">
                            <option value="" disabled selected>Select Party</option>
                        </select>
                    </div>

                    <!-- Step 3: Document Number -->
                    <div class="form-group hidden" id="step-doc-number">
                        <label for="docNumber">Document Number</label>
                        <input type="text" id="docNumber" name="docNumber" placeholder="Enter doc number...">
                    </div>

                    <!-- Conditional Fields: DEAL PAYMENT -->
                    <div id="dealFields" class="conditional-section hidden">
                        <div class="section-title">Deal Information</div>
                        <div class="form-group">
                            <label>Deal Details</label>
                            <textarea id="dealDetails" readonly></textarea>
                        </div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Which company is paying?</label>
                                <select id="payingCompany"></select>
                            </div>
                            <div class="form-group">
                                <label>Purchasing Company</label>
                                <input type="text" id="purchasingCompany" readonly>
                            </div>
                        </div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Currency</label>
                                <input type="text" id="dealCurrency" readonly>
                            </div>
                            <div class="form-group">
                                <label>Amount</label>
                                <input type="text" id="dealAmount" readonly>
                            </div>
                        </div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Exchange Rate (Manual)</label>
                                <input type="number" step="0.01" id="exchangeRate" placeholder="0.00">
                            </div>
                            <div class="form-group">
                                <label>Receiving Currency</label>
                                <select id="receivingCurrency">
                                    <option value="USD">USD</option>
                                    <option value="EUR">EUR</option>
                                    <option value="INR">INR</option>
                                    <option value="AED">AED</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Conditional Fields: SALES PAYMENT -->
                    <div id="salesFields" class="conditional-section hidden">
                        <div class="section-title">Sales Information</div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Commodity Name</label>
                                <input type="text" id="salesCommodity" readonly>
                            </div>
                            <div class="form-group">
                                <label>Party Name</label>
                                <input type="text" id="salesParty" readonly>
                            </div>
                        </div>
                        <div class="grid-3">
                            <div class="form-group">
                                <label>Quantity</label>
                                <input type="text" id="salesQty" readonly>
                            </div>
                            <div class="form-group">
                                <label>Rate</label>
                                <input type="text" id="salesRate" readonly>
                            </div>
                            <div class="form-group">
                                <label>Total Value</label>
                                <input type="text" id="salesTotal" readonly>
                            </div>
                        </div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Currency</label>
                                <input type="text" id="salesCurrency" readonly>
                            </div>
                            <div class="form-group">
                                <label>Payment Term</label>
                                <input type="text" id="salesTerm" readonly>
                            </div>
                        </div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Value of Advance</label>
                                <input type="text" id="salesAdvance" readonly>
                            </div>
                            <div class="form-group">
                                <label>Percentage (%)</label>
                                <input type="text" id="salesPercent" readonly>
                            </div>
                        </div>
                    </div>

                    <!-- Conditional Fields: EXPENSE PAYMENT -->
                    <div id="expenseFields" class="conditional-section hidden">
                        <div class="section-title">Expense Information</div>
                        <div class="form-group">
                            <label>Name of Party</label>
                            <input type="text" id="expenseParty" readonly>
                        </div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Item Name</label>
                                <input type="text" id="expenseItem" readonly>
                            </div>
                            <div class="form-group">
                                <label>Item Value</label>
                                <input type="text" id="expenseValue" readonly>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Currency (According to Bill)</label>
                            <input type="text" id="expenseCurrency" readonly>
                        </div>
                    </div>

                    <div id="submitContainer" class="form-actions hidden">
                        <button type="submit" class="btn-primary">
                            <span>Process Payment</span>
                            <div class="btn-shine"></div>
                        </button>
                    </div>
                </form>
            </div>
        </main>

        <footer>
            &copy; 2026 ERP Solutions Inc. • Secure Presentation Mode
        </footer>
    </div>

    <!-- Feedback Toast -->
    <div id="toast" class="toast hidden"></div>

    <script src="script.js"></script>
</body>
</html>
